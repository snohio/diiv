---
driver:
  name: azurerm
  subscription_id: <%= ENV["AZURE_SUBSCRIPTION_ID"] %>
  location: "East US"
  machine_size: "Standard_D2s_v3"
  azure_resource_group_prefix: "GITACTION-DIIV-"
  resource_group_tags:
    X-TTL: '2'
    application: 'chef'
    team: 'chef-se'
    owner: 'michael.butler@progress.com'
    expiration: '2026-09-30'
    ephemeral: 'no'

provisioner:
  name: chef_infra
  always_update_cookbooks: true
  product_name: chef
  product_version: 18
  channel: stable
  max_retries: 3
  wait_for_retry: 90
  retry_on_exit_code: [35, 213]

verifier:
  name: inspec

platforms:
  - name: ubuntu20
    driver:
      image_urn: Canonical:0001-com-ubuntu-server-focal:20_04-lts:latest
    transport:
      name: ssh
      ssh_key: ~/.ssh/id_kitchen-azurerm

  - name: ubuntu22
    driver:
      image_urn: Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest
    transport:
      name: ssh
      ssh_key: ~/.ssh/id_kitchen-azurerm

  - name: ubuntu24
    driver:
      image_urn: Canonical:ubuntu-24_04-lts:server:latest
    transport:
      name: ssh
      ssh_key: ~/.ssh/id_kitchen-azurerm

  - name: RHEL8
    driver:
      image_urn: RedHat:RHEL:8-LVM:latest
    transport:
      name: ssh
      ssh_key: ~/.ssh/id_kitchen-azurerm

  - name: Windows2019
    os_type: windows
    transport:
      name: winrm
      elevated: true
    driver:
      image_urn: MicrosoftWindowsServer:WindowsServer:2019-Datacenter:latest
      winrm_powershell_script: |-
        Set-MpPreference -DisableRealtimeMonitoring 1
        winrm quickconfig -q
        Set-NetFirewallRule -Name "WINRM-HTTP-In-TCP" -RemoteAddress Any -Enabled True
        Get-NetConnectionProfile | Set-NetConnectionProfile -NetworkCategory Private

  - name: Windows2022
    os_type: windows
    transport:
      name: winrm
      elevated: true
    driver:
      image_urn: MicrosoftWindowsServer:WindowsServer:2022-datacenter-azure-edition:latest
      winrm_powershell_script: |-
        Set-MpPreference -DisableRealtimeMonitoring $true
        winrm quickconfig -q
        Set-NetFirewallRule -Name "WINRM-HTTP-In-TCP" -RemoteAddress Any -Enabled True
        Get-NetConnectionProfile | Set-NetConnectionProfile -NetworkCategory Private

suites:
  - name: default
    run_list:
      - recipe[diiv::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      audit:
        reporter: "cli"
      diiv:
        music_url:
          - "https://stuff.snohio.com/3Oh3.zip"

